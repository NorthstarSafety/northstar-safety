<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ app_name }} | Reset workspace password</title>
  <link rel="icon" href="/static/favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
  <main class="public-shell" style="max-width: 560px; padding-top: 80px;">
    <section class="hero-card">
      <p class="eyebrow">Workspace access</p>
      <h1>Reset a workspace password</h1>
      <p class="lead">Enter the workspace email. If that user exists, Northstar will prepare a reset flow without exposing whether the account is present.</p>
      {% if flash %}
      <div class="flash {{ flash.level }}" style="margin-top: 18px;">{{ flash.message }}</div>
      {% endif %}
      <form method="post" action="/reset-password" class="form-grid" style="margin-top: 24px;">
        <label style="grid-column: 1 / -1;">Workspace email<input type="email" name="email" autocomplete="username" required></label>
        <div class="button-row" style="grid-column: 1 / -1;">
          <button type="submit">Send reset link</button>
          <a class="button ghost" href="/login">Back to sign-in</a>
        </div>
      </form>
    </section>
  </main>
</body>
</html>
