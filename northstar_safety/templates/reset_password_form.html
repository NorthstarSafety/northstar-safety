<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ app_name }} | Choose a new password</title>
  <link rel="icon" href="/static/favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
  <main class="public-shell" style="max-width: 560px; padding-top: 80px;">
    <section class="hero-card">
      <p class="eyebrow">Workspace access</p>
      <h1>Choose a new password</h1>
      <p class="lead">Resetting access for {{ user_email }}.</p>
      {% if flash %}
      <div class="flash {{ flash.level }}" style="margin-top: 18px;">{{ flash.message }}</div>
      {% endif %}
      <form method="post" action="/reset-password/{{ token }}" class="form-grid" style="margin-top: 24px;">
        <label>Password<input type="password" name="password" autocomplete="new-password" required></label>
        <label>Confirm password<input type="password" name="confirm_password" autocomplete="new-password" required></label>
        <div class="button-row" style="grid-column: 1 / -1;">
          <button type="submit">Save password</button>
          <a class="button ghost" href="/login">Back to sign-in</a>
        </div>
      </form>
    </section>
  </main>
</body>
</html>
