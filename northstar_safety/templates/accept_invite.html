<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ app_name }} | Accept workspace invite</title>
  <link rel="icon" href="/static/favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
  <main class="public-shell" style="max-width: 620px; padding-top: 80px;">
    <section class="hero-card">
      <p class="eyebrow">Workspace invite</p>
      <h1>Create your Northstar access</h1>
      <p class="lead">You were invited as <strong>{{ invite.role }}</strong> for <strong>{{ invite.email }}</strong>.</p>
      {% if invite.note %}
      <p class="small muted" style="margin-top: 12px;">Note from {{ invite.invited_by }}: {{ invite.note }}</p>
      {% endif %}
      {% if flash %}
      <div class="flash {{ flash.level }}" style="margin-top: 18px;">{{ flash.message }}</div>
      {% endif %}
      <form method="post" action="/accept-invite/{{ token }}" class="form-grid" style="margin-top: 24px;">
        <label style="grid-column: 1 / -1;">Full name<input type="text" name="full_name" autocomplete="name" required></label>
        <label>Password<input type="password" name="password" autocomplete="new-password" required></label>
        <label>Confirm password<input type="password" name="confirm_password" autocomplete="new-password" required></label>
        <div class="button-row" style="grid-column: 1 / -1;">
          <button type="submit">Create workspace account</button>
          <a class="button ghost" href="/login">Back to sign-in</a>
        </div>
      </form>
    </section>
  </main>
</body>
</html>
